[versions]
#===================
#===== Android =====
#===================
compile-sdk-version = "33"
min-sdk-version = "21"
target-sdk-version = "33"
#===================
#===== Compile =====
#===================
agp = "7.2.2"
kotlin = "1.7.10"
#==================
###### Android dependencies #####
#==================
coroutines = "1.6.4"
material = "1.6.1"
appcompat = "1.4.2"
core-ktx = "1.8.0"
recyclerview = "1.2.1"
constraint-layout = "2.1.4"
navigation = "2.5.1"
#==================
### Android Compose
#==================
compose = "1.2.0"
androidx-activity-compose = "1.5.1"
compose-compilerextension = "1.2.0"
#==================
# Third party
#==================
detekt = "1.21.0"
dokka = "1.7.10"
ktlint = "0.45.2"
ktlint-gradle = "10.3.0"
benmanesversion = "0.42.0"
#==================
# Test
#==================
junit = "4.13.2"
androidx_test = "1.4.0"
androidx_test_ext = "1.1.3"
espresso_core = "3.4.0"
jupiter = "5.9.0"
kluent = "1.68"
test-runner = "1.4.0"
mockk = "1.12.5"
arch = "2.1.0"

[libraries]
# Compile
agp = { module = "com.android.tools.build:gradle", version.ref = "agp" }
kgp = { module = "org.jetbrains.kotlin:kotlin-gradle-plugin", version.ref = "kotlin" }
kotlin-reflect = { module = "org.jetbrains.kotlin:kotlin-reflect", version.ref = "kotlin" }
kotlin-coroutines = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-android", version.ref = "coroutines" }
# Android
android_material = { module = "com.google.android.material:material", version.ref = "material" }
androidx_appcompat = { module = "androidx.appcompat:appcompat", version.ref = "appcompat" }
androidx_constraintlayout = { module = "androidx.constraintlayout:constraintlayout", version.ref = "constraint.layout" }
androidx_recyclerview = { module = "androidx.recyclerview:recyclerview", version.ref = "recyclerview" }
androidx_core_ktx = { module = "androidx.core:core-ktx", version.ref = "core.ktx" }
androidx_navigation_fragment = { module = "androidx.navigation:navigation-fragment-ktx", version.ref = "navigation" }
androidx_navigation_ui = { module = "androidx.navigation:navigation-ui-ktx", version.ref = "navigation" }
# Compose
androidx_activity_compose = { module = "androidx.activity:activity-compose", version.ref = "androidx_activity_compose" }
compose_material = { module = "androidx.compose.material:material", version.ref = "compose" }
compose_foundation = { module = "androidx.compose.foundation:foundation", version.ref = "compose" }
compose_ui = { module = "androidx.compose.ui:ui", version.ref = "compose" }
compose_ui_tooling = { module = "androidx.compose.ui:ui-tooling", version.ref = "compose" }
# Third party
detekt_formatting = { module = "io.gitlab.arturbosch.detekt:detekt-formatting", version.ref = "detekt" }
dokka_gradle_plugin = { module = "org.jetbrains.dokka:dokka-gradle-plugin", version.ref = "dokka" }
dokka_core = { module = "org.jetbrains.dokka:dokka-core", version.ref = "dokka" }
compose_ui_test_junit4 = { module = "androidx.compose.ui:ui-test-junit4", version.ref = "compose" }
compose_ui_test_manifest = { module = "androidx.compose.ui:ui-test-manifest", version.ref = "compose" }
# Test
junit = { module = "junit:junit", version.ref = "junit" }
espresso_core = { module = "androidx.test.espresso:espresso-core", version.ref = "espresso.core" }
androidx_test_rules = { module = "androidx.test:rules", version.ref = "androidx.test" }
androidx_test_runner = { module = "androidx.test:runner", version.ref = "androidx.test" }
androidx_test_ext_junit = { module = "androidx.test.ext:junit", version.ref = "androidx.test.ext" }
androidx_test_ext_junit_ktx = { module = "androidx.test.ext:junit-ktx", version.ref = "androidx.test.ext" }
test-coroutines = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-test", version.ref = "coroutines" }
kluent-android = { module = "org.amshove.kluent:kluent-android", version.ref = "kluent" }
test-runner = { module = "androidx.test:runner", version.ref = "test.runner" }
mockk = { module = "io.mockk:mockk", version.ref = "mockk" }
arch = { module = "androidx.arch.core:core-testing", version.ref = "arch" }
junit-jupiter-api = { module = "org.junit.jupiter:junit-jupiter-api", version.ref = "jupiter" }

[bundles]
kotlin = ["kotlin-reflect", "kotlin-coroutines"]
navigation = ["androidx_navigation_fragment", "androidx_navigation_ui"]
test = [
    "test-coroutines",
    "kluent-android",
    "test-runner",
    "espresso_core",
    "mockk",
    "arch",
    "junit-jupiter-api"
]

[plugins]
android_application = { id = "com.android.application", version.ref = "agp" }
android_library = { id = "com.android.library", version.ref = "agp" }
kotlin_android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
navigation = { id = "androidx.navigation.safeargs.kotlin", version.ref = "navigation" }
detekt = { id = "io.gitlab.arturbosch.detekt", version.ref = "detekt" }
ktlint = { id = "org.jlleitschuh.gradle.ktlint", version.ref = "ktlint.gradle" }
versions = { id = "com.github.ben-manes.versions", version.ref = "benmanesversion" }
